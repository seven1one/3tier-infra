---
- name: Common
  hosts: all
  tasks:
    - name: /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      loop:
        - "10.10.10.11 web01"
        - "10.10.10.14 web02"
        - "10.10.10.12 was01"
        - "10.10.10.15 was02"
        - "10.10.10.13 db01"

    - name: chrony client
      copy:
        dest: /etc/chrony.conf
        content: |
          server web01 iburst
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
      when: inventory_hostname != 'web01'
      notify: restart chronyd

  handlers:
    - name: restart chronyd
      service:
        name: chronyd
        state: restarted

- name: WEB
  hosts: web
  tasks:
    - name: httpd
      dnf:
        name: httpd
        state: present

    - name: httpd enable
      service:
        name: httpd
        state: started
        enabled: yes

    - name: ajp balancer
      copy:
        dest: /etc/httpd/conf.d/ajp.conf
        content: |
          <Proxy balancer://wascluster>
              BalancerMember ajp://was01:8009 route=was01
              BalancerMember ajp://was02:8009 route=was02
              ProxySet lbmethod=byrequests
          </Proxy>
          ProxyPass /repo !
          ProxyPass / balancer://wascluster/
          ProxyPassReverse / balancer://wascluster/
      notify: restart httpd

    - name: selinux httpd network
      command: setsebool -P httpd_can_network_connect on
      changed_when: false

    - name: kernel tuning
      copy:
        dest: /etc/sysctl.d/99-web-tuning.conf
        content: |
          net.ipv4.tcp_max_syn_backlog = 2048
          net.ipv4.ip_local_port_range = 1024 65000
      notify: apply sysctl

  handlers:
    - name: restart httpd
      service:
        name: httpd
        state: restarted

    - name: apply sysctl
      command: sysctl --system

- name: WAS
  hosts: was
  tasks:
    - name: tomcat + jdk
      dnf:
        name:
          - java-17-openjdk
          - java-17-openjdk-devel
          - tomcat
          - tomcat-webapps
          - postgresql-jdbc
        state: present

    - name: jdbc driver
      copy:
        src: /usr/share/java/postgresql-jdbc.jar
        dest: /usr/share/tomcat/lib/postgresql-jdbc.jar
        remote_src: yes

    - name: scram jars
      shell: cp $(rpm -ql ongres-scram ongres-scram-client | grep '\.jar$') /usr/share/tomcat/lib/
      args:
        creates: /usr/share/tomcat/lib/common.jar

    - name: selinux tomcat db
      command: setsebool -P tomcat_can_network_connect_db on
      changed_when: false

    - name: tomcat enable
      service:
        name: tomcat
        state: started
        enabled: yes

    - name: kernel tuning
      copy:
        dest: /etc/sysctl.d/99-was-tuning.conf
        content: |
          vm.swappiness = 10
          vm.max_map_count = 262144
      notify: apply sysctl

  handlers:
    - name: apply sysctl
      command: sysctl --system

- name: DB
  hosts: db
  tasks:
    - name: postgresql
      dnf:
        name: "@postgresql:15/server"
        state: present

    - name: redis
      dnf:
        name: redis
        state: present

    - name: postgresql enable
      service:
        name: postgresql
        state: started
        enabled: yes

    - name: redis bind
      lineinfile:
        path: /etc/redis.conf
        regexp: '^bind 127.0.0.1'
        line: 'bind 0.0.0.0'
      notify: restart redis

    - name: redis enable
      service:
        name: redis
        state: started
        enabled: yes

    - name: firewall postgresql
      command: firewall-cmd --add-service=postgresql --permanent
      changed_when: false

    - name: firewall redis
      command: firewall-cmd --add-port=6379/tcp --permanent
      changed_when: false

    - name: firewall reload
      command: firewall-cmd --reload
      changed_when: false

    - name: kernel tuning
      copy:
        dest: /etc/sysctl.d/99-db-tuning.conf
        content: |
          vm.swappiness = 10
          vm.dirty_ratio = 10
          vm.dirty_background_ratio = 5
      notify: apply sysctl

  handlers:
    - name: restart redis
      service:
        name: redis
        state: restarted

    - name: apply sysctl
      command: sysctl --system
